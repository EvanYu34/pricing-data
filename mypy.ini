[mypy]
python_version = 3.11
warn_unused_ignores = True
warn_redundant_casts = True
follow_imports = silent
# Pragmatic permissive baseline so existing Dict[str, Any] heavy code passes.
# Tighten over time (Issue #7's plan: start as report-only, increase strictness
# once errors drop below ~20).
ignore_missing_imports = True
disallow_untyped_defs = False
check_untyped_defs = False
no_implicit_optional = False
strict_optional = False

[mypy-tests.*]
ignore_errors = True

# Third-party SDKs without type stubs. Already covered by
# ignore_missing_imports above, but explicit so CI logs are cleaner.
[mypy-bs4.*]
ignore_missing_imports = True

[mypy-playwright.*]
ignore_missing_imports = True

[mypy-playwright_stealth.*]
ignore_missing_imports = True

# `types-requests` is in requirements-dev.txt; this guards against local mypy
# installs (e.g. via `uv tool install mypy`) that don't share the project venv.
[mypy-requests.*]
ignore_missing_imports = True
