name: Update AI Pricing Data

on:
  schedule:
    # 每周一 UTC 00:00 运行
    - cron: "0 0 * * 1"
  # 支持手动触发，含 force_commit 应急参数
  workflow_dispatch:
    inputs:
      force_commit:
        description: "Override audit failure and commit anyway"
        type: boolean
        default: false

jobs:
  update-pricing:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Install Playwright Chromium + system dependencies
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      # ----------------------------------------------------------------
      # Scrape — main.py orchestrates: litellm fetch → scrapers →
      # field-level merge → audit → gated persist.
      #
      # main.py reads FORCE_COMMIT from env; the workflow_dispatch input is
      # forwarded here. main.py exits non-zero on audit failure UNLESS
      # FORCE_COMMIT=true.
      #
      # NOTE: invoked bare (no pipe to tee or similar). If you ever pipe the
      # output, switch the next step's $? capture to ${PIPESTATUS[0]}.
      # ----------------------------------------------------------------
      - name: Run pricing scraper + audit
        id: scrape
        run: |
          python main.py
          echo "MAIN_EXIT=$?" >> "$GITHUB_ENV"
        continue-on-error: true
        env:
          PYTHONUNBUFFERED: "1"
          FORCE_COMMIT: ${{ github.event.inputs.force_commit }}

      - name: Check for changes to pricing.json
        id: check_changes
        run: |
          if git diff --quiet pricing.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "pricing.json 未变化，无需提交"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "pricing.json 有变化："
            git diff --stat pricing.json
          fi

      # ----------------------------------------------------------------
      # Commit gate:
      #   - main.py must have exited 0  (audit success or force_commit)
      #   - pricing.json actually changed
      # main.py itself reverts pricing.json on audit failure unless
      # FORCE_COMMIT=true, so this gate is belt-and-braces.
      # ----------------------------------------------------------------
      - name: Commit and push updated pricing.json
        if: env.MAIN_EXIT == '0' && steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # AUDIT_REPORT.md is in .gitignore — regenerated each run, lives only in Job Summary.
          git add pricing.json
          COMMIT_MSG=$(cat .commit_message 2>/dev/null \
            || echo "chore: update pricing data $(date -u +%Y-%m-%d)")
          git commit -m "$COMMIT_MSG"
          git push

      - name: Write summary to Job Summary
        if: always()
        run: |
          echo "## 📊 定价抓取摘要" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**main.py exit code**: \`${MAIN_EXIT}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -f pricing.json ]; then
            python - >> "$GITHUB_STEP_SUMMARY" <<'PYEOF'
          import json
          with open("pricing.json") as f:
              data = json.load(f)
          print(f"**最近更新时间**: {data.get('last_updated', 'n/a')}\n")
          print("| 平台 | 状态 | 模型数 | 错误信息 |")
          print("|---|---|---|---|")
          for provider, info in data.get("sources", {}).items():
              status   = info.get("fetch_status", "unknown")
              n_models = len(info.get("models", []))
              err      = info.get("error_message") or ""
              icon     = "✅" if status == "success" else "❌"
              print(f"| {provider} | {icon} {status} | {n_models} | {err} |")
          PYEOF
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -f AUDIT_REPORT.md ]; then
            cat AUDIT_REPORT.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ AUDIT_REPORT.md not generated" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail workflow if audit failed and not force-committed
        if: always() && env.MAIN_EXIT != '0'
        run: |
          if [ "${{ github.event.inputs.force_commit }}" != "true" ]; then
            echo "::error title=Audit failed::main.py exited ${MAIN_EXIT}. \
              Inspect AUDIT_REPORT.md. To override: \
              Run workflow → force_commit=true"
            exit 1
          else
            echo "::warning title=Force-committed::Audit failed (exit=${MAIN_EXIT}) but force_commit was set."
          fi
